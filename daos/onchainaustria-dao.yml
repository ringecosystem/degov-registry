description: |
  onchainaustria is Austria's first tokenized association, integrating a decentralized autonomous organization into a traditional legal framework. Governance is powered by the OCA token, allowing members to direct the association's mission of blockchain decentralization through on-chain voting. This innovative structure ensures full legal compliance while maintaining a transparent, community-driven ecosystem.

